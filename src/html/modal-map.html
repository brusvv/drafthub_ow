<!-- MAP MODAL -->
<div class="modal-overlay hidden" id="mapModal">
  <div class="modal">
    <div class="modal-title" id="mapModalTitle">Редактировать карту</div>
    <input type="hidden" id="mapEditRow">
    <div class="form-row">
      <div class="form-group"><label class="form-label">Название</label><input class="form-input" id="mName" disabled></div>
      <div class="form-group"><label class="form-label">Тип</label><input class="form-input" id="mType" disabled></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Тир</label>
        <select class="form-select" id="mTier"><option>S</option><option>A</option><option>B</option><option>C</option><option>D</option></select>
      </div>
      <div class="form-group"><label class="form-label">Приоритет</label><input class="form-input" id="mPrio" type="number" min="1" max="10" value="5"></div>
    </div>
    <!-- ATK/DEF (Hybrid/Escort/Push) -->
    <div class="form-group">
      <label class="form-label" style="display:flex;align-items:center;gap:8px">
        <input type="checkbox" id="mInPool" disabled style="accent-color:var(--support);width:15px;height:15px">
        <span>Карта в актуальном пуле</span>
        <span style="font-family:var(--mono);font-size:9px;color:var(--text3)">(редактируется в каталоге, не здесь)</span>
      </label>
    </div>
    <!-- СЛОЖНОСТЬ — иконка + точки в одну строку -->
    <div id="mAtkDefBlock" class="form-group">
      <label class="form-label">Сложность</label>
      <input type="hidden" id="mAtk" value="3">
      <input type="hidden" id="mDef" value="3">
      <div style="display:flex;flex-direction:column;gap:6px;padding:4px 0">
        <!-- ATK row: иконка + 5 точек -->
        <div style="display:flex;align-items:center;gap:8px">
          <span id="mAtkIcon" style="display:flex;align-items:center;flex-shrink:0"></span>
          <div class="dot-rating" id="mAtkDots" data-value="3" style="padding:0;gap:5px">
            <span class="dot-rating-dot atk filled" onclick="setDotRating('mAtk','mAtkDots',1)" data-v="1">◆</span>
            <span class="dot-rating-dot atk filled" onclick="setDotRating('mAtk','mAtkDots',2)" data-v="2">◆</span>
            <span class="dot-rating-dot atk filled" onclick="setDotRating('mAtk','mAtkDots',3)" data-v="3">◆</span>
            <span class="dot-rating-dot atk" onclick="setDotRating('mAtk','mAtkDots',4)" data-v="4">◆</span>
            <span class="dot-rating-dot atk" onclick="setDotRating('mAtk','mAtkDots',5)" data-v="5">◆</span>
          </div>
        </div>
        <!-- DEF row: иконка + 5 точек -->
        <div style="display:flex;align-items:center;gap:8px">
          <span id="mDefIcon" style="display:flex;align-items:center;flex-shrink:0"></span>
          <div class="dot-rating" id="mDefDots" data-value="3" style="padding:0;gap:5px">
            <span class="dot-rating-dot def filled" onclick="setDotRating('mDef','mDefDots',1)" data-v="1">◆</span>
            <span class="dot-rating-dot def filled" onclick="setDotRating('mDef','mDefDots',2)" data-v="2">◆</span>
            <span class="dot-rating-dot def filled" onclick="setDotRating('mDef','mDefDots',3)" data-v="3">◆</span>
            <span class="dot-rating-dot def" onclick="setDotRating('mDef','mDefDots',4)" data-v="4">◆</span>
            <span class="dot-rating-dot def" onclick="setDotRating('mDef','mDefDots',5)" data-v="5">◆</span>
          </div>
        </div>
      </div>
    </div>
    <!-- Difficulty (Control/Flashpoint) -->
    <div id="mDifBlock" style="display:none">
      <div class="form-group">
        <label class="form-label">Сложность</label>
        <input type="hidden" id="mDif" value="3">
        <div class="dot-rating" id="mDifDots" data-value="3">
          <span class="dot-rating-dot dif filled" onclick="setDotRating('mDif','mDifDots',1)" data-v="1">◆</span>
          <span class="dot-rating-dot dif filled" onclick="setDotRating('mDif','mDifDots',2)" data-v="2">◆</span>
          <span class="dot-rating-dot dif filled" onclick="setDotRating('mDif','mDifDots',3)" data-v="3">◆</span>
          <span class="dot-rating-dot dif" onclick="setDotRating('mDif','mDifDots',4)" data-v="4">◆</span>
          <span class="dot-rating-dot dif" onclick="setDotRating('mDif','mDifDots',5)" data-v="5">◆</span>
        </div>
      </div>
    </div>
    <div class="form-group"><label class="form-label">Заметки</label><textarea class="form-textarea" id="mNotes" placeholder="Особенности, тактики..." maxlength="500"></textarea></div>

    <div class="form-group">
      <label class="form-label">Предпочтительные герои</label>
      <div class="sel-heroes" id="selPreferred" onclick="openPicker('preferred')">
        <span class="sel-empty">Нажми чтобы выбрать</span>
        <span class="sel-edit-hint">✎</span>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Цели для банов</label>
      <div class="sel-heroes" id="selBans" onclick="openPicker('bans')">
        <span class="sel-empty">Нажми чтобы выбрать</span>
        <span class="sel-edit-hint">✎</span>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Состав — выбери героев и их роль</label>
      <div id="compSlots" class="comp-slots">
        <!-- 5 слотов: 1 Tank, 2 Damage, 2 Support -->
        <div class="comp-slot-row">
          <span class="comp-slot-role-lbl tank-lbl">Tank</span>
          <div class="comp-slot" data-slot="0" onclick="openCompSlotPicker(0,'Tank')"><span class="sel-empty">Выбрать</span></div>
        </div>
        <div class="comp-slot-row">
          <span class="comp-slot-role-lbl dmg-lbl">Damage</span>
          <div class="comp-slot" data-slot="1" onclick="openCompSlotPicker(1,'Damage')"><span class="sel-empty">Выбрать</span></div>
          <div class="comp-slot" data-slot="2" onclick="openCompSlotPicker(2,'Damage')"><span class="sel-empty">Выбрать</span></div>
        </div>
        <div class="comp-slot-row">
          <span class="comp-slot-role-lbl sup-lbl">Support</span>
          <div class="comp-slot" data-slot="3" onclick="openCompSlotPicker(3,'Support')"><span class="sel-empty">Выбрать</span></div>
          <div class="comp-slot" data-slot="4" onclick="openCompSlotPicker(4,'Support')"><span class="sel-empty">Выбрать</span></div>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Контрпики на этой карте</label>
      <div class="sel-heroes" id="selMapCounters" onclick="openPicker('mapCounters')" style="min-height:36px">
        <span class="sel-empty">Нажми чтобы выбрать</span>
        <span class="sel-edit-hint">✎</span>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-danger" id="mapDeleteBtn" onclick="deleteMap()" style="display:none">Удалить</button>
      <button class="btn" onclick="closeModal('mapModal')">Отмена</button>
      <button class="btn btn-primary" onclick="saveMap()">Сохранить</button>
    </div>
  </div>
</div>
