<!-- HERO MODAL -->
<div class="modal-overlay hidden" id="heroModal">
  <div class="modal">
    <!-- Заголовок с кнопкой X справа -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
      <div class="modal-title" id="heroModalTitle" style="margin:0">Редактировать героя</div>
      <button onclick="closeModal('heroModal')" style="background:none;border:none;color:var(--text3);font-size:20px;line-height:1;cursor:pointer;padding:2px 6px;border-radius:4px" title="Закрыть">×</button>
    </div>
    <input type="hidden" id="heroEditRow">
    <div id="heroModeNote" style="display:none;font-size:11px;color:var(--text3);background:var(--bg3);
      border:1px solid var(--border);border-radius:7px;padding:7px 10px;margin-bottom:10px"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Имя</label><input class="form-input" id="hName" disabled></div>
      <div class="form-group"><label class="form-label">Роль</label><input class="form-input" id="hRole" disabled></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Подкласс</label><input class="form-input" id="hSub" disabled></div>
      <div class="form-group"><label class="form-label">Приоритет (1–10)</label><input class="form-input" id="hPrio" type="number" min="1" max="10" value="5"></div>
    </div>
    <div class="form-group">
      <label class="form-label" style="display:flex;align-items:center;gap:6px">
        <input type="checkbox" id="hBanned" style="accent-color:var(--damage)"> В текущем бане
      </label>
    </div>

    <!-- Контрпики -->
    <div class="form-group" style="margin-bottom:.75rem">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <label class="form-label" style="margin:0;font-size:12px;font-weight:700;letter-spacing:.04em">Контрпики</label>
        <button class="btn" onclick="openCounterPicker()"
          style="font-size:14px;font-weight:700;padding:0 8px;border-radius:6px;line-height:1.6;min-width:24px">+</button>
      </div>
      <div id="heroCounterBlock"></div>
    </div>
    <!-- Синергии -->
    <div class="form-group" style="margin-bottom:.875rem">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <label class="form-label" style="margin:0;font-size:12px;font-weight:700;letter-spacing:.04em">Синергии</label>
        <button class="btn" onclick="openSynergyPicker()" id="hSynergyAddBtn"
          style="font-size:14px;font-weight:700;padding:0 8px;border-radius:6px;line-height:1.6;min-width:24px">+</button>
      </div>
      <div id="heroSynergyBlock"></div>
    </div>

    <!-- Сила на картах — заголовок как у контрпиков/синергий -->
    <div class="form-group">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <label class="form-label" style="margin:0;font-size:12px;font-weight:700;letter-spacing:.04em">Сила на картах</label>
        <button class="btn" onclick="openMapStrPicker()" id="hStrengthAddBtn"
          style="font-size:14px;font-weight:700;padding:0 8px;border-radius:6px;line-height:1.6;min-width:24px">↗</button>
        <button class="hs-filter-btn" id="mapStrFilterBtn"
          onclick="toggleStrengthFilter(this)" style="margin-left:auto">С оценкой</button>
      </div>
      <!-- Чипы карт с оценками — аналогично контрпикам/синергиям -->
      <div id="heroStrengthPreview" style="display:flex;flex-wrap:wrap;gap:6px;min-height:28px">
        <span class="empty" style="font-size:11px">Нет оценок — нажми «↗»</span>
      </div>
    </div>

    <div class="form-group"><label class="form-label">Заметки</label><textarea class="form-textarea" id="hNotes" placeholder="Комментарии..."></textarea></div>

    <div class="modal-footer">
      <button class="btn btn-danger" id="heroDeleteBtn" onclick="deleteHero()" style="display:none">Удалить</button>
      <button class="btn" onclick="closeModal('heroModal')">Отмена</button>
      <button class="btn btn-primary" onclick="saveHero()">Сохранить</button>
    </div>
  </div>

</div>
