<!-- HERO MODAL -->
<div class="modal-overlay hidden" id="heroModal">
  <div class="modal">
    <!-- Заголовок с кнопкой X справа -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
      <div class="modal-title" id="heroModalTitle" style="margin:0">Добавить героя</div>
      <button onclick="closeModal('heroModal')" style="background:none;border:none;color:var(--text3);font-size:20px;line-height:1;cursor:pointer;padding:2px 6px;border-radius:4px" title="Закрыть">×</button>
    </div>
    <input type="hidden" id="heroEditRow">
    <div class="form-row">
      <div class="form-group"><label class="form-label">Имя *</label><input class="form-input" id="hName" placeholder="Tracer"></div>
      <div class="form-group"><label class="form-label">Роль *</label>
        <select class="form-select" id="hRole"><option value="">— роль —</option><option>Tank</option><option>Damage</option><option>Support</option></select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Подкласс</label><input class="form-input" id="hSub" placeholder="Flanker"></div>
      <div class="form-group"><label class="form-label">Приоритет (1–10)</label><input class="form-input" id="hPrio" type="number" min="1" max="10" value="5"></div>
    </div>
    <div class="form-group">
      <label class="form-label" style="display:flex;align-items:center;gap:6px">
        <input type="checkbox" id="hBanned" style="accent-color:var(--damage)"> В текущем бане
      </label>
    </div>

    <!-- Контрпики и синергии — в два столбца -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:.875rem">
      <!-- Контрпики (левый столбец) -->
      <div>
        <label class="form-label">Контрпики <span style="font-family:var(--mono);font-size:9px;color:var(--text3)">(≥8 = бан)</span></label>
        <div class="sel-heroes" id="selHeroCounters" onclick="openCounterPicker()" style="min-height:36px">
          <span class="sel-empty">Выбрать</span><span class="sel-edit-hint">✎</span>
        </div>
      </div>
      <!-- Синергии (правый столбец) -->
      <div>
        <label class="form-label">Синергии</label>
        <div id="heroSynergyBlock"></div>
      </div>
    </div>

    <!-- Сила на картах -->
    <div class="form-group">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <label class="form-label" style="margin:0">Сила на картах</label>
        <div style="display:flex;gap:6px;align-items:center">
          <button class="hs-filter-btn" id="mapStrFilterBtn"
            onclick="toggleStrengthFilter(this)">С оценкой</button>
          <button class="btn" onclick="openMapStrPicker()"
            style="font-size:10px;padding:4px 10px">Открыть редактор ↗</button>
        </div>
      </div>
      <div id="heroStrengthPreview" class="hs-map-row" style="min-height:28px">
        <span class="empty" style="font-size:11px">Нет оценок — нажми «Открыть редактор»</span>
      </div>
    </div>

    <div class="form-group"><label class="form-label">Заметки</label><textarea class="form-textarea" id="hNotes" placeholder="Комментарии..."></textarea></div>

    <div class="modal-footer">
      <button class="btn btn-danger" id="heroDeleteBtn" onclick="deleteHero()" style="display:none">Удалить</button>
      <button class="btn" onclick="closeModal('heroModal')">Отмена</button>
      <button class="btn btn-primary" onclick="saveHero()">Сохранить</button>
    </div>
  </div>

</div>
