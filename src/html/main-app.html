<!-- MAIN APP -->
<div id="app" style="display:none">
<div class="app">
  <div class="header">
    <div class="header-brand">
      <span class="header-tag">Draft Hub</span>
      <span class="header-title">Team Analyst</span>
    </div>
    <div class="header-right">
      <div class="team-chip authed-only" style="position:relative;cursor:pointer" onclick="renderTeamSwitcher();document.getElementById('teamSwitcherPopup').classList.toggle('hidden')">
        <span id="headerTeamName" style="font-weight:700;font-size:13px"></span>
        <span id="headerRoleBadge" style="font-family:var(--mono);font-size:9px;text-transform:uppercase;margin-left:6px"></span>
        <div id="teamSwitcherPopup" class="hidden" style="position:absolute;top:100%;right:0;margin-top:6px;
          background:var(--bg2);border:1px solid var(--border2);border-radius:9px;padding:6px;min-width:180px;z-index:50"></div>
      </div>
      <span id="headerTeamName_public" style="font-weight:700;font-size:13px;display:none"></span>

      <!-- ── Переключатель режима приложения ── -->
      <div id="appModeSwitcher" class="app-mode-switcher">
        <!-- Рендерится renderAppModeSwitcher() из render-nav.js -->
      </div>

      <button class="btn authed-only" onclick="smartSyncSeed()" title="Добавить новых героев/карты не трогая существующие данные">↑ Sync</button>
      <div class="user-chip authed-only"><div class="user-av" id="userInitial">U</div><span id="userName">Пользователь</span></div>
      <button class="btn btn-danger authed-only" onclick="signOut()">Выйти</button>
      <button class="btn btn-primary" id="headerLoginBtn" style="display:none" onclick="renderAuthUI('login')">Войти</button>
    </div>
  </div>

  <nav class="nav">
    <button class="nav-btn active authed-only" onclick="showView('maps',this)">Карты<span class="nav-count" id="navCountMaps"></span></button>
    <button class="nav-btn authed-only" onclick="showView('heroes',this)">Герои<span class="nav-count" id="navCountHeroes"></span></button>
    <button class="nav-btn" id="navTiersBtn" onclick="showView('tiers',this)">Tier List</button>
    <button class="nav-btn authed-only" onclick="showView('bans',this)">Драфт</button>
    <button class="nav-btn authed-only" onclick="showView('players',this)">Игроки<span class="nav-count" id="navCountPlayers"></span></button>
    <button class="nav-btn authed-only" onclick="showView('roster',this)">Состав<span class="nav-count" id="navCountRoster"></span></button>
    <button class="nav-btn authed-only" onclick="showView('settings',this)" id="navSettingsBtn">Настройки</button>
    <button class="nav-btn admin-only" onclick="showView('admin',this)" id="navAdminBtn">Админ</button>
  </nav>

  <div id="view-maps" class="view active">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
      <span style="font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--text3)">Пул карт:</span>
      <button class="btn pool-active" id="mapPoolToggle" onclick="toggleMapPool(this)" style="font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.06em;padding:3px 10px;border-radius:20px">АКТУАЛЬНЫЙ</button>
      <span style="font-family:var(--mono);font-size:16px;font-weight:700;color:var(--text2)" id="mapPoolCount"></span>
    </div>
    <div class="toolbar">
      <div class="filters" id="mapFilters"><!-- рендерится renderMapFilters() --></div>
      <button class="btn btn-primary" onclick="openMapModal()">+ Карта</button>
    </div>
    <div id="mapGrid" class="map-grid"></div>
    <div id="mapDetail" class="map-detail"></div>
  </div>

  <div id="view-heroes" class="view">
    <div class="toolbar">
      <div class="filters" id="heroFilters">
        <button class="f-btn active" onclick="filterHeroes('all',this)">Все</button>
        <button class="f-btn" onclick="filterHeroes('Tank',this)">Tank</button>
        <button class="f-btn" onclick="filterHeroes('Damage',this)">Damage</button>
        <button class="f-btn" onclick="filterHeroes('Support',this)">Support</button>
      </div>
      <button class="btn btn-primary" id="addHeroBtn" onclick="openHeroModal()">+ Герой</button>
    </div>
    <div id="heroPool"></div>
  </div>

  <div id="view-tiers" class="view">
    <div id="tierModeSwitcher"></div>
    <div id="tierSetSelector"></div>
    <div class="tier-tabs">
      <button class="tier-tab active" onclick="switchTierTab('maps',this)">Карты</button>
      <button class="tier-tab" onclick="switchTierTab('heroes',this)">Герои</button>
    </div>
    <div id="tierMapFilters" class="filters" style="margin-bottom:12px">
      <button class="f-btn active" onclick="filterTierMaps('all',this)">Все</button>
      <button class="f-btn" onclick="filterTierMaps('Hybrid',this)">Hybrid</button>
      <button class="f-btn" onclick="filterTierMaps('Escort',this)">Escort</button>
      <button class="f-btn" onclick="filterTierMaps('Control',this)">Control</button>
      <button class="f-btn" onclick="filterTierMaps('Push',this)">Push</button>
      <button class="f-btn" onclick="filterTierMaps('Flashpoint',this)">Flashpoint</button>
    </div>
    <div id="tierHeroFilters" class="filters" style="margin-bottom:12px;display:none">
      <button class="f-btn active" onclick="filterTierHeroes('all',this)">Все</button>
      <button class="f-btn" onclick="filterTierHeroes('Tank',this)">Tank</button>
      <button class="f-btn" onclick="filterTierHeroes('Damage',this)">Damage</button>
      <button class="f-btn" onclick="filterTierHeroes('Support',this)">Support</button>
    </div>
    <div id="tierListMaps"></div>
    <div id="tierListHeroes" style="display:none"></div>
  </div>

  <div id="view-bans" class="view">
    <div class="section-lbl">Герои в текущем бане</div>
    <div id="bansGrid" class="bans-grid"></div>
  </div>

  <div id="view-players" class="view">
    <div class="toolbar">
      <div class="section-lbl" style="margin:0">Состав команды</div>
      <button class="btn btn-primary" onclick="openPlayerModal()">+ Игрок</button>
    </div>
    <div id="playerGrid" class="players-grid" style="margin-top:1rem"></div>
    <div id="playerDetail" class="player-detail"></div>
  </div>

  <div id="view-roster" class="view">
    <div class="toolbar">
      <div class="section-lbl" style="margin:0">Сборка состава</div>
      <button class="btn btn-primary" onclick="openRosterPlayerPicker()">+ Добавить игрока</button>
    </div>
    <div id="rosterContent" style="margin-top:1rem"></div>
  </div>

  <div id="view-settings" class="view">
    <!-- рендерится renderTeamSettings() из auth/ui.js -->
  </div>

  <div id="view-admin" class="view">
    <!-- рендерится renderAdminPanel() из render/render-admin.js -->
  </div>
</div>
</div>
