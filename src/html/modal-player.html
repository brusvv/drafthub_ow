<!-- PLAYER MODAL -->
<div class="modal-overlay hidden" id="playerModal">
  <div class="modal">
    <div class="modal-title" id="playerModalTitle">Добавить игрока</div>
    <input type="hidden" id="playerEditRow">
    <div class="form-row">
      <div class="form-group"><label class="form-label">Никнейм *</label><input class="form-input" id="pName" placeholder="PlayerOne"></div>
      <div class="form-group"><label class="form-label">Battle.net tag</label><input class="form-input" id="pBtag" placeholder="PlayerOne#1234"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Основная роль *</label>
        <select class="form-select" id="pMainRole" onchange="onPlayerRoleChange()">
          <option value="">— роль —</option>
          <option>Tank</option><option>Damage</option><option>Support</option><option>Flex</option>
        </select>
      </div>
      <div class="form-group"><label class="form-label">Офф-роль</label>
        <select class="form-select" id="pOffRole" onchange="onPlayerRoleChange()">
          <option value="">— нет —</option>
          <option>Tank</option><option>Damage</option><option>Support</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Ранг Tank</label><input class="form-input" id="pRankTank" placeholder="Diamond 3"></div>
      <div class="form-group"><label class="form-label">Ранг Damage</label><input class="form-input" id="pRankDmg" placeholder="Platinum 1"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Ранг Support</label><input class="form-input" id="pRankSup" placeholder="Diamond 1"></div>
      <div class="form-group"></div>
    </div>

    <!-- Hero pools per role — shown dynamically -->
    <div id="playerHeroPoolsBlock">
      <!-- filled by onPlayerRoleChange() -->
    </div>

    <div class="form-group"><label class="form-label">Заметки</label><textarea class="form-textarea" id="pNotes" placeholder="Сильные стороны, стиль игры..."></textarea></div>
    <div class="modal-footer">
      <button class="btn btn-danger" id="playerDeleteBtn" onclick="deletePlayer()" style="display:none">Удалить</button>
      <button class="btn" onclick="closeModal('playerModal')">Отмена</button>
      <button class="btn btn-primary" onclick="savePlayer()">Сохранить</button>
    </div>
  </div>
</div>
