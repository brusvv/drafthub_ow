<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Draft Hub V2 — Tier List, исправленная архитектура доступа</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0B0B0D;
  --surface-1:#141417;
  --surface-2:#1B1B1F;
  --surface-3:#232326;
  --surface-4:#2A2A2E;
  --border-1:#2F2F36;
  --border-2:#3A3A42;
  --text-1:#F5F5F7;
  --text-2:#A1A1AA;
  --text-3:#71717A;
  --accent:#FF8A00;
  --accent-hover:#FFA733;
  --success:#22C55E;
  --danger:#EF4444;
  /* было --tank/--damage/--support (V1-имена) — приведено к канону
     DESIGN_SYSTEM.md §1.3 (--role-*) по ходу этой правки, см. отчёт п.4 */
  --role-tank:#4A9EE0;
  --role-damage:#E05555;
  --role-support:#2BBD8E;
  --tier-s:#F0A030; --tier-a:#8BC34A; --tier-b:#5B9BD5; --tier-c:#888; --tier-d:#A04030;
  --radius-sm:6px; --radius-md:8px; --radius-lg:12px;
  --font-sans:'Inter',sans-serif;
  --font-mono:'Space Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#050506;font-family:var(--font-sans);color:var(--text-1);padding:32px;display:flex;flex-direction:column;gap:16px;align-items:center}

.toolbar{display:flex;gap:8px;background:var(--surface-1);border:1px solid var(--border-1);border-radius:10px;padding:4px;flex-wrap:wrap;max-width:1180px;justify-content:center}
.toolbar button{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.06em;padding:8px 14px;border-radius:7px;border:none;background:transparent;color:var(--text-3);cursor:pointer;transition:all .15s}
.toolbar button:hover{color:var(--text-2)}
.toolbar button.active{background:var(--surface-3);color:var(--text-1)}
.toolbar .sep{width:1px;background:var(--border-1);margin:4px 2px}
.toolbar .anon-toggle{display:flex;align-items:center;gap:6px;padding:0 10px;font-family:var(--font-mono);font-size:10px;text-transform:uppercase;color:var(--text-3)}
.toolbar .anon-toggle input{accent-color:var(--accent)}
.toolbar .anon-toggle.disabled{opacity:.35;pointer-events:none}

.frame{width:1180px;height:760px;background:var(--bg);border:1px solid var(--border-1);border-radius:12px;overflow:hidden;display:flex;flex-direction:column}

/* ── Shell — 1:1 из nav-shell-mockup.html/heroes-screen-mockup.html.
   Добавлен сюда впервые в этом файле специально: находка "Global read-only
   для анонима — тот же Shell, просто урезанный" непроверяема без самого
   Shell в макете — раньше в этом файле его не было вообще, см. отчёт п.1. ── */
.identity-bar{height:56px;flex-shrink:0;background:var(--surface-1);border-bottom:1px solid var(--border-1);display:flex;align-items:center;justify-content:space-between;padding:0 20px;transition:opacity .15s}
.identity-left{display:flex;align-items:center;gap:10px}
.wordmark{font-weight:700;font-size:14px;letter-spacing:-.01em}
.wordmark span{color:var(--accent)}
.identity-right{display:flex;align-items:center;gap:10px}
.scope-switch{display:flex;gap:2px;background:var(--surface-2);border-radius:7px;padding:2px}
.scope-switch button{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:.05em;padding:5px 10px;border-radius:5px;border:none;background:transparent;color:var(--text-3);cursor:pointer}
.scope-switch button.active{background:var(--surface-3);color:var(--text-1)}
/* Анонимный индикатор — НЕ переключатель: некликабельный div, как в реальном
   V1 renderAppModeSwitcher() для публичного режима (см. отчёт п.1). */
.mode-pill-static{font-family:var(--font-mono);font-size:11px;background:var(--surface-2);border:1px solid var(--border-1);border-radius:7px;padding:6px 12px;color:var(--text-2);cursor:default}
.login-btn{font-family:var(--font-mono);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:7px 14px;border-radius:7px;border:none;background:var(--accent);color:#000;cursor:pointer}
.team-chip{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;padding:6px 10px;border-radius:8px;cursor:pointer}
.team-chip:hover{background:var(--surface-2)}
.avatar{width:26px;height:26px;border-radius:50%;background:var(--surface-3);border:1px solid var(--border-2);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:10px;font-weight:700;color:var(--text-2)}

.body-row{flex:1;display:flex;min-height:0}
.rail{width:220px;flex-shrink:0;background:var(--surface-1);border-right:1px solid var(--border-1);padding:12px 8px;display:flex;flex-direction:column;gap:2px;transition:opacity .15s}
.rail-item{height:40px;display:flex;align-items:center;gap:10px;padding:0 12px;border-radius:8px;border-left:2px solid transparent;cursor:pointer;color:var(--text-2)}
.rail-item .icon{width:18px;height:18px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--text-2)}
.rail-item .icon svg{width:16px;height:16px}
.rail-item .label{font-size:14px;font-weight:400}
.rail-item:hover{background:var(--surface-2);color:var(--text-1)}
.rail-item.active{background:var(--surface-3);border-left-color:var(--accent);color:var(--text-1)}
.rail-item.active .label{font-weight:600}
.rail-item.active .icon{color:var(--accent)}
.rail-secondary{display:flex;flex-direction:column;gap:2px}
.rail-secondary .rail-item,.rail-secondary .rail-item .icon{color:var(--text-3)}
.rail-divider{height:1px;background:var(--border-1);margin:12px 12px}
/* Аноним — рельс сжимается до одного пункта (Tier List), группировать
   больше нечего (см. caption "по умолчанию" nav-shell-mockup.html —
   тот же паттерн, применённый здесь впервые на реальном экране). */
.rail.anon-collapsed .rail-primary > *,
.rail.anon-collapsed .rail-divider,
.rail.anon-collapsed .rail-secondary > *:not(.tierlist-rail-item){display:none}

.workspace{flex:1;min-height:0;overflow-y:auto;padding:24px 28px;display:flex;flex-direction:column;gap:16px}

/* ── Mode switcher (Workspace-owned, не Shell) ── */
.mode-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.meta-label{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-3)}
.mode-btn{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.05em;padding:6px 12px;border-radius:20px;border:1px solid var(--border-2);background:transparent;color:var(--text-2);cursor:pointer;transition:all .1s;display:flex;align-items:center;gap:5px}
.mode-btn:hover{color:var(--text-1)}
.mode-btn.active{border-color:var(--border-2);color:var(--text-1);background:var(--surface-3)}
.share-btn{margin-left:auto;font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:.05em;padding:6px 12px;border-radius:20px;border:1px solid var(--border-2);background:transparent;color:var(--text-2);cursor:pointer}
.share-btn:hover{color:var(--text-1);border-color:var(--border-2)}

.tierset-row{display:flex;align-items:center;gap:8px}
.tierset-chip{font-family:var(--font-mono);font-size:11px;padding:6px 12px;border-radius:20px;border:1px solid var(--border-2);background:var(--surface-3);color:var(--text-1);display:flex;align-items:center;gap:6px;cursor:pointer}
.tierset-count{font-family:var(--font-mono);font-size:10px;color:var(--text-3)}

.share-panel{background:var(--surface-2);border:1px solid var(--border-1);border-radius:var(--radius-lg);padding:14px 16px;display:none;flex-direction:column;gap:8px}
.share-panel.show{display:flex}
.share-panel-title{font-size:13px;font-weight:700}
.share-panel-desc{font-size:11px;color:var(--text-3)}
.share-row{display:flex;gap:8px;align-items:center;background:var(--surface-1);border:1px solid var(--border-1);border-radius:var(--radius-sm);padding:8px 10px}
.share-url{font-family:var(--font-mono);font-size:11px;color:var(--text-2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.share-copy{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;padding:4px 10px;border-radius:6px;border:1px solid var(--border-2);background:transparent;color:var(--text-2);cursor:pointer}

.tabs{display:flex;gap:4px}
.tab-underline{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.06em;padding:8px 4px;border:none;background:none;color:var(--text-3);cursor:pointer;border-bottom:2px solid transparent;transition:all .1s}
.tab-underline.active{color:var(--text-1);border-bottom-color:var(--accent)}
.tab-underline:hover:not(.active){color:var(--text-2)}

.filters{display:flex;gap:4px;flex-wrap:wrap}
.f-chip{font-family:var(--font-mono);font-size:11px;padding:5px 12px;border-radius:20px;border:1px solid var(--border-2);background:transparent;color:var(--text-2);cursor:pointer}
.f-chip.active{background:var(--surface-3);color:var(--text-1);border-color:var(--border-2)}

.tier-row{display:flex;align-items:stretch;gap:14px;border-left:3px solid transparent;padding-left:8px;border-radius:0 8px 8px 0;position:relative}
.tier-row[data-tier="S"]{border-left-color:var(--tier-s)}
.tier-row[data-tier="A"]{border-left-color:var(--tier-a)}
.tier-row[data-tier="B"]{border-left-color:var(--tier-b)}
.tier-row[data-tier="C"]{border-left-color:var(--tier-c)}
.tier-row[data-tier="D"]{border-left-color:var(--tier-d)}
.tier-lbl{font-family:var(--font-mono);font-size:22px;font-weight:800;width:48px;min-height:48px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:4px}
.tier-zone{display:flex;flex-wrap:wrap;gap:6px;min-height:56px;flex:1;border-radius:8px;padding:7px;align-items:flex-start}

.tier-pill{font-size:13px;font-weight:600;padding:7px 14px;border-radius:8px;background:var(--surface-2);border:1px solid var(--border-1);cursor:grab;display:flex;align-items:center;gap:6px}
.tier-hero-pill{width:44px;height:44px;border-radius:7px;cursor:grab;position:relative;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:var(--text-3);background:var(--surface-2);border:2px solid var(--border-2)}
.tier-hero-pill[data-role="Tank"]{border-color:var(--role-tank)}
.tier-hero-pill[data-role="Damage"]{border-color:var(--role-damage)}
.tier-hero-pill[data-role="Support"]{border-color:var(--role-support)}

/* Read-only — банер + курсор + непрозрачность. Замки убраны (см. отчёт п.2):
   баннер уже даёт текстовый дубль состояния целиком для экрана — повторять
   его на каждой из 20+ пилюль ничего не добавляет, только шумит (§3.1). */
.tier-row[data-editable="false"] .tier-pill,
.tier-row[data-editable="false"] .tier-hero-pill{cursor:default;opacity:.88}
.readonly-banner{display:none;align-items:center;gap:6px;font-family:var(--font-mono);font-size:11px;color:var(--text-2);background:var(--surface-2);border:1px solid var(--border-1);border-radius:var(--radius-sm);padding:8px 10px}
.readonly-banner.show{display:flex}

/* ── Share-token экран — БЕЗ Shell вообще (см. отчёт п.1). Не вариант
   .frame, а полностью отдельная разметка на body — 1:1 воспроизводит
   V1 handleSharedTierUrl(), который делает document.body.innerHTML=... ── */
.shared-standalone{display:none;width:720px;flex-direction:column;gap:16px;padding:32px;background:var(--surface-1);border:1px solid var(--border-1);border-radius:12px}
.shared-standalone.show{display:flex}
.shared-standalone-head{text-align:center;padding-bottom:16px;border-bottom:1px solid var(--border-1)}
.shared-standalone-title{font-size:20px;font-weight:700;margin-bottom:4px}
.shared-standalone-sub{font-family:var(--font-mono);font-size:11px;color:var(--text-3)}

.state-caption{width:1180px;font-family:var(--font-mono);font-size:11px;color:var(--text-3);line-height:1.6}
.state-caption b{color:var(--text-2)}
</style>
</head>
<body>

<div class="toolbar" id="toolbar">
  <button class="active" data-state="team" onclick="setState('team',this)">Командный</button>
  <button data-state="global" onclick="setState('global',this)">Глобальный</button>
  <div class="anon-toggle disabled" id="anonToggle">
    <input type="checkbox" id="anonCheck" onchange="onAnonToggle(this.checked)" disabled>
    <label for="anonCheck">Аноним</label>
  </div>
  <button data-state="personal" onclick="setState('personal',this)">Личный + Поделиться</button>
  <div class="sep"></div>
  <button data-state="shared" onclick="setState('shared',this)">Share-ссылка (без Shell)</button>
</div>

<div class="frame" id="frame">
  <div class="identity-bar" id="identityBar">
    <div class="identity-left"><div class="wordmark">DRAFT HUB <span>V2</span></div></div>
    <div class="identity-right" id="identityRight"></div>
  </div>
  <div class="body-row">
    <nav class="rail" id="rail">
      <div class="rail-primary" id="railPrimary">
        <div class="rail-item"><span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 20l-6-3V4l6 3m0 13l6-3m-6 3V7m6 10l6 3V6l-6-3m0 14V4"/></svg></span><span class="label">Карты</span></div>
        <div class="rail-item"><span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a8 8 0 0 1 16 0v1"/></svg></span><span class="label">Герои</span></div>
        <div class="rail-item"><span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></span><span class="label">Драфт</span></div>
        <div class="rail-item"><span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="14" rx="2"/><path d="M3 9h18"/></svg></span><span class="label">Состав</span></div>
        <div class="rail-item"><span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="7" r="3"/><path d="M2 20v-1a6 6 0 0 1 12 0v1"/><circle cx="17" cy="8" r="2.5"/><path d="M15.5 20v-.5a5 5 0 0 1 7 0v.5"/></svg></span><span class="label">Игроки</span></div>
      </div>
      <div class="rail-divider" id="railDivider"></div>
      <div class="rail-secondary" id="railSecondary">
        <div class="rail-item active tierlist-rail-item"><span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h4v4H4zM4 14h4v4H4zM11 7h9M11 17h9"/></svg></span><span class="label">Tier List</span></div>
        <div class="rail-item"><span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82"/></svg></span><span class="label">Настройки</span></div>
      </div>
    </nav>

    <div class="workspace">
      <div class="mode-row" id="modeRow"></div>
      <div class="tierset-row" id="tiersetRow" style="display:none"></div>
      <div class="share-panel" id="sharePanel"></div>
      <div class="readonly-banner" id="readonlyBanner">🔒 <span>Только просмотр — редактировать может суперадмин</span></div>

      <div class="tabs">
        <button class="tab-underline active" onclick="setTab('maps',this)">Карты</button>
        <button class="tab-underline" onclick="setTab('heroes',this)">Герои</button>
      </div>

      <div class="filters" id="filtersRow">
        <button class="f-chip active">Все</button>
        <button class="f-chip">Control</button>
        <button class="f-chip">Hybrid</button>
        <button class="f-chip">Escort</button>
        <button class="f-chip">Push</button>
        <button class="f-chip">Flashpoint</button>
      </div>

      <div id="tierRows"></div>
    </div>
  </div>
</div>

<!-- Share-token состояние — НЕ .frame, отдельная разметка без identity-bar/rail -->
<div class="shared-standalone" id="sharedStandalone">
  <div class="shared-standalone-head">
    <div class="shared-standalone-title">Team Analyst — Tier List карт</div>
    <div class="shared-standalone-sub">draftub.app/tier/a3f9e21c · расшарено по ссылке, без входа</div>
  </div>
  <div id="sharedTierRows"></div>
</div>

<div class="state-caption" id="caption"></div>

<script>
const mapsData = {
  S: ['Antarctic Peninsula', 'King\'s Row'],
  A: ['Lijiang Tower', 'Numbani'],
  B: ['Ilios', 'Busan', 'Dorado'],
  C: ['Oasis'],
  D: []
};
const heroesData = {
  S: [{n:'D.Va',r:'Tank'},{n:'Kiriko',r:'Support'}],
  A: [{n:'Ana',r:'Support'},{n:'Genji',r:'Damage'},{n:'Winston',r:'Tank'}],
  B: [{n:'Reinhardt',r:'Tank'},{n:'Soldier: 76',r:'Damage'}],
  C: [{n:'Torbjörn',r:'Damage'}],
  D: []
};
const tierStyle = {S:{bg:'rgba(240,160,48,.15)',c:'var(--tier-s)'},A:{bg:'rgba(139,195,74,.15)',c:'var(--tier-a)'},
                   B:{bg:'rgba(91,155,213,.15)',c:'var(--tier-b)'},C:{bg:'rgba(136,136,136,.1)',c:'var(--tier-c)'},
                   D:{bg:'rgba(160,64,48,.15)',c:'var(--tier-d)'}};

function tierRowsHtml(isMaps, editable){
  return ['S','A','B','C','D'].map(t=>{
    const items = isMaps ? mapsData[t] : heroesData[t];
    const style = tierStyle[t];
    const pills = isMaps
      ? items.map(n=>`<div class="tier-pill" draggable="${editable}">${n}</div>`).join('')
      : items.map(h=>`<div class="tier-hero-pill" data-role="${h.r}" draggable="${editable}" title="${h.n}">${h.n[0]}</div>`).join('');
    return `<div class="tier-row" data-tier="${t}" data-editable="${editable}">
      <div class="tier-lbl" style="background:${style.bg};color:${style.c}">${t}</div>
      <div class="tier-zone">${pills}</div>
    </div>`;
  }).join('');
}

function renderTiers(editable){
  const isMaps = document.querySelector('.tab-underline.active').textContent.trim()==='Карты';
  document.getElementById('tierRows').innerHTML = tierRowsHtml(isMaps, editable);
}

function setTab(tab, btn){
  document.querySelectorAll('.tab-underline').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const editable = document.getElementById('frame').dataset.editable === 'true';
  renderTiers(editable);
}

/* ── Идентити-полоса справа: команда/аноним, независимо от mode-row.
   Урезается ТОЛЬКО когда Global + Аноним — см. отчёт п.1. ── */
function renderIdentityRight(anon){
  const el = document.getElementById('identityRight');
  el.innerHTML = anon
    ? `<div class="mode-pill-static">🌐</div><button class="login-btn">Войти</button>`
    : `<div class="scope-switch"><button>Team</button><button>Personal</button></div>
       <div class="team-chip">Team Analyst<div class="avatar">TA</div></div>`;
}

const modeRowsAuth = {
  team: `<span class="meta-label">Тир-лист:</span>
    <button class="mode-btn">🌐 Глобальный</button>
    <button class="mode-btn active">👥 Командный</button>
    <button class="mode-btn">👤 Личный</button>`,
  global: `<span class="meta-label">Тир-лист:</span>
    <button class="mode-btn active">🌐 Глобальный</button>
    <button class="mode-btn">👥 Командный</button>
    <button class="mode-btn">👤 Личный</button>`,
  personal: `<span class="meta-label">Тир-лист:</span>
    <button class="mode-btn">🌐 Глобальный</button>
    <button class="mode-btn">👥 Командный</button>
    <button class="mode-btn active">👤 Личный</button>
    <button class="share-btn" onclick="document.getElementById('sharePanel').classList.toggle('show')">🔗 Поделиться</button>`,
};

const captions = {
  team: '<b>Командный, редактируемый</b> — drag&drop активен, Shell полный (rail + identity), без изменений от предыдущего разбора.',
  global: '<b>Глобальный, read-only, авторизован</b> — обычный вошедший пользователь смотрит общий тир-лист. Read-only banner без замков на пилюлях (п.2 отчёта) — баннер один раз говорит то же самое, что раньше повторяли N раз.',
  'global-anon': '<b>Глобальный, аноним</b> — переключатель «Аноним» доступен ТОЛЬКО когда активен Global (это не отдельный режим, это урезание прав внутри Global, см. п.1 отчёта). Mode-switcher сворачивается в один некликабельный индикатор 🌐, справа — кнопка «Войти» вместо scope-switch/team-chip. Shell (rail+identity-bar) остаётся — просто rail схлопнут до одного пункта (Tier List), группировать больше нечего.',
  personal: '<b>Личный + Поделиться</b> — панель шеринга инлайн в Workspace, не Overlay.',
  shared: '<b>Share-ссылка (/tier/TOKEN)</b> — архитектурно ДРУГОЙ экран, не состояние Global. Совсем без Shell: ни identity-bar, ни rail — 1:1 повторяет то, что реальный handleSharedTierUrl() делает через document.body.innerHTML, минуя обычный рендер приложения целиком.'
};

function onAnonToggle(checked){
  renderIdentityRight(checked);
  document.getElementById('rail').classList.toggle('anon-collapsed', checked);
  document.getElementById('modeRow').innerHTML = checked
    ? '<span class="meta-label" style="opacity:.5">Тир-лист: Глобальный (только просмотр)</span>'
    : modeRowsAuth.global;
  document.getElementById('caption').innerHTML = captions[checked ? 'global-anon' : 'global'];
}

function setState(state, btn){
  document.querySelectorAll('#toolbar > button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');

  const anonToggle = document.getElementById('anonToggle');
  const anonCheck = document.getElementById('anonCheck');
  const frame = document.getElementById('frame');
  const shared = document.getElementById('sharedStandalone');

  if(state==='shared'){
    frame.style.display = 'none';
    shared.classList.add('show');
    document.getElementById('sharedTierRows').innerHTML = tierRowsHtml(true, false);
    document.getElementById('caption').innerHTML = captions.shared;
    return;
  }
  frame.style.display = 'flex';
  shared.classList.remove('show');

  anonToggle.classList.toggle('disabled', state!=='global');
  anonCheck.disabled = state!=='global';
  if(state!=='global'){ anonCheck.checked = false; }

  document.getElementById('rail').classList.remove('anon-collapsed');
  document.getElementById('tiersetRow').style.display = state==='personal' ? 'flex' : 'none';
  document.getElementById('sharePanel').classList.remove('show');
  document.getElementById('readonlyBanner').classList.toggle('show', state==='global');

  const anon = state==='global' && anonCheck.checked;
  renderIdentityRight(anon);
  document.getElementById('modeRow').innerHTML = modeRowsAuth[state];
  document.getElementById('caption').innerHTML = captions[state];

  if(state==='personal'){
    document.getElementById('tiersetRow').innerHTML = `
      <div class="tierset-chip">📋 S14 Meta ▾</div>
      <span class="tierset-count">3/10</span>`;
    document.getElementById('sharePanel').innerHTML = `
      <div class="share-panel-title">Поделиться тир-листом</div>
      <div class="share-panel-desc">Ссылка доступна анонимно, без входа в аккаунт.</div>
      <div class="share-row">
        <span class="share-url">draftub.app/tier/a3f9e21c</span>
        <button class="share-copy">Скопировать</button>
      </div>`;
  }

  const editable = state==='team' || state==='personal';
  frame.dataset.editable = editable;
  renderTiers(editable);
}

setState('team', document.querySelector('#toolbar button.active'));
</script>
</body>
</html>
