name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build
        run: |
          chmod +x build.sh
          ./build.sh
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}

      - name: Commit @hash updates
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/js/ src/css/
          if git diff --cached --quiet; then
            echo "✓ Все @hash актуальны, коммит не нужен"
          else
            # Берём оригинальный commit message (заголовок + тело) от пользователя.
            # GITHUB_EVENT_PATH содержит JSON события push с полем head_commit.message.
            # Добавляем [skip ci] в конец — страховка от петли на сторонних CI.
            ORIGINAL_MSG=$(jq -r '.head_commit.message' "$GITHUB_EVENT_PATH")
            git commit -m "${ORIGINAL_MSG}" -m "[skip ci]"
            git push origin main
            echo "✓ @hash обновлены, сообщение: ${ORIGINAL_MSG%%$'\n'*}"
          fi

      - name: Проверить dist/index.html
        run: |
          test -f dist/index.html || { echo "❌ dist/index.html не найден"; exit 1; }
          echo "✓ $(wc -l < dist/index.html) строк"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Проверить синтаксис встроенного JS
        run: |
          # build.sh пишет весь app-бандл в один инлайн <script>...</script>
          # (см. build.sh: `echo '<script>'` … `cat >> "$OUT" <<'FOOTER' ... </script>`).
          # test -f выше ловит только "файла нет", не битый JS внутри —
          # так прошёл баг с `??=` + постфиксным `++` в одном выражении.
          # Извлекаем именно этот блок по точным строкам-маркерам (а не первому
          # попавшемуся <script>, их в файле три — CDN-теги supabase-js и
          # Google Identity Services идут с атрибутами на той же строке и без
          # тела, их awk-паттерн не подхватит) и прогоняем через node --check.
          awk '/^<script>$/{f=1;next} /^<\/script>$/{f=0} f' dist/index.html > /tmp/dist-inline.js
          test -s /tmp/dist-inline.js || { echo "❌ инлайн <script> не найден или пуст — проверь маркеры в build.sh"; exit 1; }
          node --check /tmp/dist-inline.js
          echo "✓ инлайн JS синтаксически валиден ($(wc -l < /tmp/dist-inline.js) строк)"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
