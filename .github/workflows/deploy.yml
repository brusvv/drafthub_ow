name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build
        run: |
          chmod +x build.sh
          ./build.sh
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}

      - name: Commit @hash updates
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/js/ src/css/
          if git diff --cached --quiet; then
            echo "✓ Все @hash актуальны, коммит не нужен"
          else
            # Берём оригинальный commit message (заголовок + тело) от пользователя.
            # GITHUB_EVENT_PATH содержит JSON события push с полем head_commit.message.
            # Добавляем [skip ci] в конец — страховка от петли на сторонних CI.
            ORIGINAL_MSG=$(jq -r '.head_commit.message' "$GITHUB_EVENT_PATH")
            git commit -m "${ORIGINAL_MSG}" -m "[skip ci]"
            git push origin main
            echo "✓ @hash обновлены, сообщение: ${ORIGINAL_MSG%%$'\n'*}"
          fi

      - name: Проверить dist/index.html
        run: |
          test -f dist/index.html || { echo "❌ dist/index.html не найден"; exit 1; }
          echo "✓ $(wc -l < dist/index.html) строк"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
