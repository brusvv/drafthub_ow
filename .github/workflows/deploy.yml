name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:   # позволяет запускать вручную из интерфейса GitHub

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Проверить что dist/index.html существует
        run: |
          test -f dist/index.html && echo "OK: $(wc -l < dist/index.html) строк"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
