name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
    # Не триггеримся на коммиты с [skip ci] — нет петли
    paths-ignore:
      - '**/*.md'
  workflow_dispatch:

permissions:
  contents: write   # git push обновлённых @hash
  pages: write      # деплой на GitHub Pages
  id-token: write   # OIDC токен для deploy-pages

# Pages сериализует деплои сам — cancel-in-progress: false обязателен
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Нужна полная история чтобы git push @hash работал
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build (обновляет @hash, собирает dist/index.html)
        run: |
          chmod +x build.sh
          ./build.sh

      # Коммитим @hash до деплоя — так они попадают в репо
      # GITHUB_TOKEN не триггерит новый workflow (это гарантия GitHub)
      # [skip ci] — дополнительная страховка для сторонних CI систем
      - name: Commit @hash updates
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/js/ src/css/
          if git diff --cached --quiet; then
            echo "✓ Все @hash актуальны, коммит не нужен"
          else
            git commit -m "chore: update @hash [skip ci]"
            git push origin main
            echo "✓ @hash обновлены и запушены в репо"
          fi

      - name: Проверить dist/index.html
        run: |
          test -f dist/index.html || { echo "❌ dist/index.html не найден"; exit 1; }
          echo "✓ $(wc -l < dist/index.html) строк"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
